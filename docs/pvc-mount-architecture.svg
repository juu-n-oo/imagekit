<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" width="1200" height="920" font-family="'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 z" fill="#5d6878"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="10" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,3.5 L0,7 z" fill="#1d63ed"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#16243f" flood-opacity="0.10"/>
    </filter>
    <style>
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
      .title{font-size:27px;font-weight:800;fill:#161d2b;}
      .sub{font-size:14px;fill:#5d6878;}
      .sech{font-size:16px;font-weight:800;fill:#1d63ed;}
      .hdr{font-size:14.5px;font-weight:700;fill:#ffffff;}
      .body{font-size:12.5px;fill:#283346;}
      .mut{font-size:11px;fill:#5d6878;}
      .code{font-size:12px;fill:#1452c4;}
      .stg{font-size:11px;font-weight:700;fill:#5d6878;letter-spacing:.04em;}
      .tf{font-size:10.5px;font-weight:700;fill:#1d63ed;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="920" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" class="title">AIPub Volume · 빌드 컨텍스트 · Dockerfile 경로 매핑</text>
  <text x="600" y="70" text-anchor="middle" class="sub">하나의 PVC를 두 Pod가 다른 경로에 마운트한다 — 경로 정규화 흐름</text>

  <!-- ───────── Block 1 ───────── -->
  <text x="36" y="116" class="sech">①  하나의 PVC, 두 개의 마운트</text>

  <!-- PVC cylinder -->
  <g filter="url(#sh)">
    <path d="M482 168 L482 236 A118 20 0 0 0 718 236 L718 168" fill="#e9f0fe" stroke="#1d63ed" stroke-width="2"/>
    <ellipse cx="600" cy="168" rx="118" ry="20" fill="#d7e3fb" stroke="#1d63ed" stroke-width="2"/>
  </g>
  <text x="600" y="166" text-anchor="middle" font-size="13.5" font-weight="800" fill="#0c1730">AIPubVolume PVC</text>
  <text x="600" y="200" text-anchor="middle" class="mono code" font-size="11.5">pjw-volume-8b5c4c37</text>
  <text x="600" y="221" text-anchor="middle" class="mut">루트: all_conversations.txt · temp/common.zip</text>

  <!-- arrows from PVC to the two pods -->
  <path d="M512 232 C 430 280, 330 280, 285 318" fill="none" stroke="#5d6878" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M688 232 C 770 280, 870 280, 915 318" fill="none" stroke="#5d6878" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="330" y="276" text-anchor="middle" class="mono" font-size="11" fill="#5d6878">mount → /data (RW)</text>
  <text x="872" y="276" text-anchor="middle" class="mono" font-size="11" fill="#0f7a50">mount → /build-context (RO)</text>

  <!-- Left pod: AIPubVolume Pod -->
  <g filter="url(#sh)">
    <rect x="70" y="320" width="420" height="158" rx="12" fill="#ffffff" stroke="#d8deea" stroke-width="1.5"/>
    <path d="M70 332 a12 12 0 0 1 12 -12 h396 a12 12 0 0 1 12 12 v20 h-420 z" fill="#1d63ed"/>
  </g>
  <text x="88" y="342" class="hdr">AIPubVolume Pod  ·  PVC 유틸 / SFTP</text>
  <text x="90" y="378" class="body">마운트: <tspan class="mono code">PVC → /data</tspan>  (Read-Write)</text>
  <text x="90" y="402" class="body">Browse API가 이 Pod에 exec → <tspan class="mono code">ls /data</tspan></text>
  <text x="90" y="430" class="body">사용자에겐 <tspan class="mono code">/data</tspan> 를 숨기고,</text>
  <text x="90" y="450" class="body">PVC 루트(<tspan class="mono code">/</tspan>) 기준 경로로 정규화하여 반환</text>

  <!-- Right pod: Kaniko Pod -->
  <g filter="url(#sh)">
    <rect x="710" y="320" width="420" height="158" rx="12" fill="#ffffff" stroke="#d8deea" stroke-width="1.5"/>
    <path d="M710 332 a12 12 0 0 1 12 -12 h396 a12 12 0 0 1 12 12 v20 h-420 z" fill="#0f7a50"/>
  </g>
  <text x="728" y="342" class="hdr">Kaniko Pod  ·  ImageBuild Job</text>
  <text x="730" y="378" class="body">마운트: <tspan class="mono code">PVC → /build-context</tspan>  (RO)</text>
  <text x="730" y="402" class="body mono code">--context = dir:///build-context</text>
  <text x="730" y="426" class="body">Dockerfile(ConfigMap) → <tspan class="mono code">/kaniko-config</tspan></text>
  <text x="730" y="450" class="body"><tspan class="mono code">/workspace</tspan> 는 PVC 마운트 ✗ (레이어 쓰기 전용)</text>

  <!-- ───────── Block 2 : path transformation pipeline ───────── -->
  <text x="36" y="540" class="sech">②  경로 변환 파이프라인  —  같은 파일이 단계마다 다른 경로로 보인다</text>

  <!-- stage boxes -->
  <!-- helper geometry: y=566 h=120 ; x = 24,260,496,732,968 ; w=206 -->
  <g>
    <!-- stage 1 -->
    <g filter="url(#sh)"><rect x="24" y="566" width="206" height="120" rx="11" fill="#ffffff" stroke="#d8deea" stroke-width="1.5"/></g>
    <rect x="24" y="566" width="206" height="6" rx="3" fill="#1d63ed"/>
    <text x="127" y="598" text-anchor="middle" class="stg">PVC 내부 (실제)</text>
    <text x="127" y="636" text-anchor="middle" class="mono code" font-size="13">all_conversations.txt</text>
    <text x="127" y="664" text-anchor="middle" class="mut">PVC 루트 기준 상대경로</text>

    <!-- stage 2 -->
    <g filter="url(#sh)"><rect x="260" y="566" width="206" height="120" rx="11" fill="#ffffff" stroke="#d8deea" stroke-width="1.5"/></g>
    <rect x="260" y="566" width="206" height="6" rx="3" fill="#3f7ae0"/>
    <text x="363" y="598" text-anchor="middle" class="stg">AIPubVolume Pod</text>
    <text x="363" y="630" text-anchor="middle" class="mono code" font-size="12.5">/data/</text>
    <text x="363" y="648" text-anchor="middle" class="mono code" font-size="12.5">all_conversations.txt</text>
    <text x="363" y="674" text-anchor="middle" class="mut">Pod 내 절대경로</text>

    <!-- stage 3 -->
    <g filter="url(#sh)"><rect x="496" y="566" width="206" height="120" rx="11" fill="#ffffff" stroke="#d8deea" stroke-width="1.5"/></g>
    <rect x="496" y="566" width="206" height="6" rx="3" fill="#16b1ff"/>
    <text x="599" y="598" text-anchor="middle" class="stg">Browse API 반환</text>
    <text x="599" y="636" text-anchor="middle" class="mono code" font-size="13">/all_conversations.txt</text>
    <text x="599" y="664" text-anchor="middle" class="mut">/data 제거 → 루트 /</text>

    <!-- stage 4 -->
    <g filter="url(#sh)"><rect x="732" y="566" width="206" height="120" rx="11" fill="#ffffff" stroke="#d8deea" stroke-width="1.5"/></g>
    <rect x="732" y="566" width="206" height="6" rx="3" fill="#3aa06f"/>
    <text x="835" y="598" text-anchor="middle" class="stg">Dockerfile COPY</text>
    <text x="835" y="636" text-anchor="middle" class="mono code" font-size="13">all_conversations.txt</text>
    <text x="835" y="664" text-anchor="middle" class="mut">leading / 제거</text>

    <!-- stage 5 -->
    <g filter="url(#sh)"><rect x="968" y="566" width="206" height="120" rx="11" fill="#ffffff" stroke="#0f7a50" stroke-width="1.8"/></g>
    <rect x="968" y="566" width="206" height="6" rx="3" fill="#0f7a50"/>
    <text x="1071" y="598" text-anchor="middle" class="stg" fill="#0f7a50">Kaniko 빌드 컨텍스트</text>
    <text x="1071" y="628" text-anchor="middle" class="mono code" font-size="12">/build-context/</text>
    <text x="1071" y="646" text-anchor="middle" class="mono code" font-size="12">all_conversations.txt</text>
    <text x="1071" y="674" text-anchor="middle" font-size="11" font-weight="700" fill="#0f7a50">✓ 존재 → 빌드 성공</text>
  </g>

  <!-- transform arrows between stages (gaps: 230-260, 466-496, 702-732, 938-968) -->
  <g>
    <line x1="232" y1="626" x2="258" y2="626" stroke="#1d63ed" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="245" y="612" text-anchor="middle" class="tf">+ /data</text>

    <line x1="468" y1="626" x2="494" y2="626" stroke="#1d63ed" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="481" y="612" text-anchor="middle" class="tf">− /data</text>

    <line x1="704" y1="626" x2="730" y2="626" stroke="#1d63ed" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="717" y="612" text-anchor="middle" class="tf">− 앞 /</text>

    <line x1="940" y1="626" x2="966" y2="626" stroke="#1d63ed" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="953" y="612" text-anchor="middle" class="tf">+ /build-context</text>
  </g>

  <!-- ───────── Block 3 : caution ───────── -->
  <g filter="url(#sh)">
    <rect x="24" y="724" width="1150" height="92" rx="12" fill="#fff8e6" stroke="#f3e0a8" stroke-width="1.5"/>
    <rect x="24" y="724" width="6" height="92" rx="3" fill="#9a5a08"/>
  </g>
  <text x="50" y="756" font-size="14" font-weight="800" fill="#9a5a08">⚠  왜 /workspace 가 아니라 /build-context 인가?</text>
  <text x="50" y="781" class="body">Kaniko 는 <tspan class="mono code">/workspace</tspan> 를 이미지 레이어 쓰기 영역으로 사용한다. read-only PVC 를 <tspan class="mono code">/workspace</tspan> 에 마운트하면</text>
  <text x="50" y="802" class="body"><tspan font-weight="700" fill="#d43b3b">"read-only file system"</tspan> 에러가 발생하므로, 빌드 컨텍스트 PVC 는 <tspan class="mono code">/build-context</tspan> (RO) 로 분리한다.</text>

  <!-- footer -->
  <text x="600" y="876" text-anchor="middle" class="body">결과 — Browse 정규화(<tspan class="mono code">/</tspan>) 와 Kaniko 컨텍스트(<tspan class="mono code">/build-context</tspan>) 의 기준점이 모두 <tspan font-weight="700">PVC 루트</tspan>로 일치 → COPY 소스 경로가 항상 맞는다.</text>
  <text x="600" y="900" text-anchor="middle" class="mut">ImageKit · PVC Mount Architecture · 2026-06-05</text>
</svg>
